<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeviceMatch Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:white;
  transition:0.3s;
}

body.light {
  background:#f3f4f6;
  color:#111;
}

nav {
  position:sticky;
  top:0;
  backdrop-filter:blur(12px);
  background:rgba(15,23,42,0.7);
  padding:15px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

body.light nav {
  background:rgba(255,255,255,0.7);
}

nav h2 { font-weight:700; }

nav button {
  padding:6px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#6366f1;
  color:white;
}

.hero {
  padding:80px 10%;
  text-align:center;
  background:linear-gradient(135deg,#6366f1,#9333ea);
}

.hero h1 {
  font-size:42px;
  margin-bottom:20px;
}

.hero p {
  max-width:700px;
  margin:auto;
  opacity:0.9;
}

.section {
  padding:60px 8%;
}

.domain-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.domain-card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.domain-card:hover {
  transform:translateY(-8px);
  background:rgba(99,102,241,0.2);
}

.filters {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:30px;
}

.filters input, .filters select {
  padding:8px;
  border-radius:8px;
  border:none;
}

.device-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.device-card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:15px;
  transition:0.3s;
  opacity:0;
  transform:translateY(20px);
  animation:fadeIn 0.5s forwards;
}

@keyframes fadeIn {
  to { opacity:1; transform:translateY(0); }
}

.device-card:hover {
  transform:translateY(-10px);
}

.device-card img {
  width:100%;
  border-radius:15px;
}

.badge {
  background:#22c55e;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.rating {
  color:#facc15;
}

button.action {
  margin-top:10px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#6366f1;
  color:white;
  cursor:pointer;
  margin-right:5px;
}

.compare-section table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

.compare-section th, .compare-section td {
  border:1px solid gray;
  padding:8px;
  text-align:center;
}

footer {
  text-align:center;
  padding:30px;
  opacity:0.6;
}
</style>
</head>

<body>

<nav>
  <h2>DeviceMatch Pro</h2>
  <button onclick="toggleTheme()">Toggle Theme</button>
</nav>

<section class="hero">
  <h1>Find The Perfect Device For Your Needs</h1>
  <p>Smart recommendations based on your domain, budget, and performance needs. Stop wasting money. Buy smarter.</p>
</section>

<section class="section">
<h2>Select Your Domain</h2>
<div class="domain-grid">
  <div class="domain-card" onclick="selectDomain('college')">🎓 College</div>
  <div class="domain-card" onclick="selectDomain('office')">💼 Office</div>
  <div class="domain-card" onclick="selectDomain('gaming')">🎮 Gaming</div>
  <div class="domain-card" onclick="selectDomain('creative')">🎨 Creative</div>
</div>
</section>

<section class="section">
<h2>Devices</h2>

<div class="filters">
  <input type="text" id="search" placeholder="Search..." oninput="renderDevices()">
  <select id="brandFilter" onchange="renderDevices()">
    <option value="">All Brands</option>
    <option>Dell</option>
    <option>HP</option>
    <option>ASUS</option>
    <option>Acer</option>
    <option>Apple</option>
  </select>
  <select id="performanceFilter" onchange="renderDevices()">
    <option value="">All Performance</option>
    <option>Basic</option>
    <option>Mid</option>
    <option>High</option>
  </select>
  <input type="range" min="20000" max="250000" step="10000" id="budget" oninput="renderDevices()">
</div>

<div class="device-grid" id="devices"></div>
</section>

<section class="section compare-section">
<h2>Compare</h2>
<table id="compareTable"></table>
</section>

<footer>
© 2026 DeviceMatch Pro — Smart Buying Platform
</footer>

<script>
let selectedDomain = "";
let compareList = [];

const devices = [
{ name:"Dell Inspiron 15", brand:"Dell", domain:"college", performance:"Mid", price:52000, ram:"8GB", storage:"512GB SSD", rating:4 },
{ name:"HP Pavilion 15", brand:"HP", domain:"college", performance:"Mid", price:62000, ram:"16GB", storage:"1TB SSD", rating:4.5 },
{ name:"ASUS VivoBook", brand:"ASUS", domain:"college", performance:"Mid", price:60000, ram:"16GB", storage:"512GB SSD", rating:4 },
{ name:"Acer Aspire 7", brand:"Acer", domain:"college", performance:"Mid", price:58000, ram:"16GB", storage:"512GB SSD", rating:4 },
{ name:"MacBook Air M2", brand:"Apple", domain:"college", performance:"High", price:110000, ram:"16GB", storage:"512GB SSD", rating:5 },
{ name:"ThinkPad E14", brand:"Dell", domain:"office", performance:"High", price:75000, ram:"16GB", storage:"1TB SSD", rating:4.7 },
{ name:"ASUS ROG Strix", brand:"ASUS", domain:"gaming", performance:"High", price:145000, ram:"32GB", storage:"1TB SSD", rating:4.8 },
{ name:"HP Omen 16", brand:"HP", domain:"gaming", performance:"High", price:125000, ram:"16GB", storage:"1TB SSD", rating:4.6 },
{ name:"MacBook Pro M3", brand:"Apple", domain:"creative", performance:"High", price:180000, ram:"16GB", storage:"1TB SSD", rating:5 },
{ name:"Dell XPS 15", brand:"Dell", domain:"creative", performance:"High", price:160000, ram:"32GB", storage:"1TB SSD", rating:4.9 }
];

function toggleTheme(){
  document.body.classList.toggle("light");
}

function selectDomain(domain){
  selectedDomain = domain;
  renderDevices();
}

function renderDevices(){
  const container = document.getElementById("devices");
  container.innerHTML="";

  const search = document.getElementById("search").value.toLowerCase();
  const brand = document.getElementById("brandFilter").value;
  const performance = document.getElementById("performanceFilter").value;
  const budget = document.getElementById("budget").value;

  devices.filter(d =>
    (!selectedDomain || d.domain===selectedDomain) &&
    (!brand || d.brand===brand) &&
    (!performance || d.performance===performance) &&
    (!budget || d.price<=budget) &&
    d.name.toLowerCase().includes(search)
  ).forEach(d => {

    const bestValue = d.rating >=4.8 ? `<span class="badge">Best Value</span>`:"";

    container.innerHTML += `
      <div class="device-card">
        <img src="https://source.unsplash.com/400x250/?laptop,${d.brand}">
        <h3>${d.name}</h3>
        ${bestValue}
        <p>₹${d.price}</p>
        <p>${d.ram} | ${d.storage}</p>
        <div class="rating">${"★".repeat(Math.floor(d.rating))}</div>
        <button class="action" onclick="addCompare('${d.name}')">Compare</button>
      </div>
    `;
  });
}

function addCompare(name){
  if(!compareList.includes(name) && compareList.length<3){
    compareList.push(name);
    renderCompare();
  }
}

function renderCompare(){
  const table = document.getElementById("compareTable");
  table.innerHTML="";

  const items = devices.filter(d=>compareList.includes(d.name));
  if(items.length===0) return;

  table.innerHTML += "<tr>"+items.map(d=>`<th>${d.name}</th>`).join("")+"</tr>";
  table.innerHTML += "<tr>"+items.map(d=>`<td>₹${d.price}</td>`).join("")+"</tr>";
  table.innerHTML += "<tr>"+items.map(d=>`<td>${d.ram}</td>`).join("")+"</tr>";
  table.innerHTML += "<tr>"+items.map(d=>`<td>${d.storage}</td>`).join("")+"</tr>";
}

renderDevices();
</script>

</body>
</html>
